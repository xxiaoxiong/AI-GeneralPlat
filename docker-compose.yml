version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: ai_plat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ai_plat
      MYSQL_USER: ai_plat
      MYSQL_PASSWORD: 123456
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pai_plat_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_plat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_plat_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://ai_plat:123456@mysql:3306/ai_plat
      DATABASE_SYNC_URL: mysql+pymysql://ai_plat:123456@mysql:3306/ai_plat
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production-please-use-a-long-random-key
      DEBUG: "false"
      UPLOAD_DIR: /app/data/uploads
      CHROMA_PERSIST_DIR: /app/data/chroma
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin@123456
      ADMIN_USERNAME: admin
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:80"]'
    volumes:
      - app_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_plat_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  app_data:
